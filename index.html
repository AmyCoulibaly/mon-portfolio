<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>   BbAmy </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            border-top: 5px solid #28a745;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        h2 {
            color: #28a745;
            font-weight: 600;
            margin-bottom: 20px;
        }
        p {
            color: #7f8c8d;
            font-style: italic;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background-color: #e8f5e9;
            color: #28a745;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
            border: 1px solid #c8e6c9;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="card">

        <h1>Ndeye Amy COULIBALY </h1>

        <h2>Master 1 en Systèmes et Réseaux</h2>
        
        <p>"Passionnée par l'Intelligence Artificielle (IA) et l'automatisation des infrastructures."</p>
        
        <div class="badge">
            Déploiement Ansible réussi 
        </div>

        <div class="footer">
            Propulsé par Nginx sur mon architecture réseau sécurisée
        </div>
    </div>

</body>
</html>
